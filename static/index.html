<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cache</title>
<link rel="icon" href="icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1><img src="logo.png"></h1>
  <div class="tabs">
    <div class="tab active" data-tab="locations">Locations</div>
    <div class="tab" data-tab="items">Items</div>
  </div>
</header>

<main>
  <div class="panel">
    <div class="panel-header">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="search" placeholder="search…" autocomplete="off">
      </div>
      <button class="btn-new" id="btn-new" title="New">+</button>
    </div>
    <div class="list" id="list"></div>
  </div>

  <div class="detail" id="detail">
    <div class="detail-empty">← select an entry</div>
  </div>
</main>

<!-- Form overlay -->
<div class="form-overlay" id="form-overlay">
  <div class="form-box">
    <div class="form-header">
      <span class="form-title" id="form-title">New location</span>
      <button class="form-close" id="form-close">✕</button>
    </div>
    <div class="form-body" id="form-body"></div>
    <div class="form-footer">
      <button class="btn" id="form-cancel">Cancel</button>
      <button class="btn primary" id="form-submit">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<template id="tpl-item">
  <div class="detail-content">
    <button class="btn-back" id="d-back">← back</button>
    <div class="detail-top">
      <h2 data-bind="title"></h2>
      <div class="detail-actions">
        <button class="btn" id="d-edit">Edit</button>
        <button class="btn danger" id="d-delete">Delete</button>
      </div>
    </div>
    <div class="detail-fields">
      <div class="field">
        <span class="field-label">Location</span>
        <span class="field-value"><a class="link-parent" data-bind="location"></a></span>
      </div>
      <div class="field">
        <span class="field-label">Created</span>
        <span class="field-value muted" data-bind="created"></span>
      </div>
      <div class="field">
        <span class="field-label">Updated</span>
        <span class="field-value muted" data-bind="updated"></span>
      </div>
    </div>
  </div>
</template>

<template id="tpl-location">
  <div class="detail-content">
    <button class="btn-back" id="d-back">← back</button>
    <div class="detail-top">
      <h2 data-bind="title"></h2>
      <div class="detail-actions">
        <button class="btn" id="d-edit">Edit</button>
        <button class="btn danger" id="d-delete">Delete</button>
      </div>
    </div>
    <div class="detail-fields">
      <div class="field">
        <span class="field-label">Parent</span>
        <span class="field-value"><a class="link link-parent" data-bind="parent"></a></span>
      </div>
      <div class="field">
        <span class="field-label">Created</span>
        <span class="field-value muted" data-bind="created"></span>
      </div>
      <div class="field">
        <span class="field-label">Updated</span>
        <span class="field-value muted" data-bind="updated"></span>
      </div>
    </div>
    <h3>Locations</h3>
    <div id="loc-locations"></div>
    <button class="btn" id="d-new-location">+ Add new location</button>
    <h3>Items</h3>
    <div id="loc-items">${itemsHtml}</div>
    <button class="btn" id="d-new-item">+ Add new item</button>
  </div>
</template>

<template id="tpl-mini-item">
  <span class="mini-item">◈ <span data-bind="name">${esc(i.name)}</span></span>
</template>

<template id="tpl-mini-location">
  <span class="mini-location">◈ <span data-bind="name">${esc(i.name)}</span></span>
</template>

<script src="app.js"></script>
</body>
</html>
